<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
</head>
<body>

    <h2>Simple Login</h2>

    <form action="/login" method="post">
        <label>Username:</label><br>
        <input type="text" name="user"><br><br>

        <label>Password:</label><br>
        <input type="password" name="pass"><br><br>

        <input type="submit" value="Login">
    </form>

</body>
</html>
